<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tweaks | Viral Video Feed</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; height: 100vh; width: 100vw; position: fixed; }
        
        .feed-container {
            height: 100vh;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }
        .feed-container::-webkit-scrollbar { display: none; }
        
        .feed-item {
            scroll-snap-align: start;
            height: 100vh;
            width: 100%;
            position: relative;
            background: #000;
        }
        
        .video-element {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .gradient-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
            height: 50%;
            pointer-events: none;
        }
        
        .action-bar {
            position: absolute;
            right: 16px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 20;
        }
        
        .action-icon {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            color: white;
            transition: transform 0.1s;
            position: relative;
        }
        .action-icon:active { transform: scale(0.92); }
        
        .like-count {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            white-space: nowrap;
        }
        
        .caption-area {
            position: absolute;
            bottom: 28px;
            left: 20px;
            right: 80px;
            z-index: 20;
            color: white;
        }
        
        .username { font-weight: 800; font-size: 15px; display: flex; align-items: center; gap: 8px; margin-bottom: 4px; cursor: pointer; }
        .caption-text { font-size: 14px; font-weight: 500; margin-top: 4px; line-height: 1.3; }
        .music-tag { font-size: 12px; opacity: 0.85; margin-top: 8px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 30;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }
        
        .logo { font-weight: 900; font-style: italic; font-size: 24px; background: linear-gradient(135deg, #f0abfc, #d946ef); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .avatar-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d946ef;
            cursor: pointer;
        }
        
        .upload-fab {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 40;
            cursor: pointer;
        }
        
        .fab-inner {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d946ef, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(217, 70, 239, 0.5);
        }
        
        .fab-inner:active { transform: scale(0.95); }
        
        .fab-content {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .fab-content i { font-size: 20px; color: white; }
        .fab-content span { font-size: 7px; font-weight: 900; color: white; margin-top: 2px; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 20px 18px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 50;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .nav-item.active { color: #d946ef; }
        .nav-item i { font-size: 24px; }
        .nav-item span { font-size: 10px; font-weight: 500; }
        
        .floating-heart {
            position: absolute;
            font-size: 2rem;
            pointer-events: none;
            animation: likeBurst 0.6s forwards;
        }
        
        @keyframes likeBurst {
            0% { transform: scale(0.2); opacity: 0; }
            40% { transform: scale(1.4); opacity: 1; }
            100% { transform: scale(1); opacity: 0; top: -40px; }
        }
        
        .loading-spinner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="logo">TWEAKS</div>
        <div>
            <img id="userAvatar" class="avatar-small" style="display: none;" onclick="window.location.href='/profile.html'">
            <i id="loginIcon" class="fas fa-user-circle" style="color: white; font-size: 28px; cursor: pointer;"></i>
        </div>
    </div>
    
    <div class="feed-container" id="feedContainer">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-pulse text-3xl text-purple-500"></i>
            <p class="mt-4 text-white/60">Loading your feed...</p>
        </div>
    </div>
    
    <div class="upload-fab" id="uploadBtn">
        <div class="fab-inner">
            <div class="fab-content">
                <i class="fas fa-plus-circle"></i>
                <span>Create</span>
            </div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <div class="nav-item active" data-page="feed">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </div>
        <div class="nav-item" data-page="discover">
            <i class="fas fa-compass"></i>
            <span>Discover</span>
        </div>
        <div class="nav-item" data-page="profile">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </div>
    </div>

    <!-- Upload Menu Modal -->
    <div id="uploadMenu" class="fixed inset-0 bg-black/80 backdrop-blur-lg z-[100] hidden items-center justify-center">
        <div class="bg-gray-900 rounded-3xl p-6 max-w-[280px] w-full text-center border border-white/20">
            <div class="flex justify-end">
                <button id="closeMenuBtn" class="text-white/60 text-2xl">&times;</button>
            </div>
            <h2 class="text-xl font-black italic mb-4 bg-gradient-to-r from-fuchsia-300 to-purple-300 bg-clip-text text-transparent">✨ create tweak</h2>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white/10 p-3 rounded-xl flex flex-col items-center gap-1 cursor-pointer hover:bg-white/20" data-option="video">
                    <i class="fas fa-video text-fuchsia-300 text-xl"></i>
                    <span class="text-xs font-bold">Video</span>
                </div>
                <div class="bg-white/10 p-3 rounded-xl flex flex-col items-center gap-1 cursor-pointer hover:bg-white/20" data-option="photo">
                    <i class="fas fa-camera text-purple-300 text-xl"></i>
                    <span class="text-xs font-bold">Photo</span>
                </div>
                <div class="bg-white/10 p-3 rounded-xl flex flex-col items-center gap-1 cursor-pointer hover:bg-white/20" data-option="story">
                    <i class="fas fa-star text-pink-300 text-xl"></i>
                    <span class="text-xs font-bold">Story</span>
                </div>
                <div class="bg-white/10 p-3 rounded-xl flex flex-col items-center gap-1 cursor-pointer hover:bg-white/20" data-option="twimoji">
                    <i class="fas fa-smile-wink text-indigo-300 text-xl"></i>
                    <span class="text-xs font-bold">Twimoji</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, collection, query, orderBy, limit, getDocs, doc, getDoc, updateDoc, arrayUnion, arrayRemove, onAuthStateChanged, signOut } from './js/firebase-config.js';
        
        let currentUser = null;
        let feedVideos = [];
        let likeStates = {};
        
        function formatNumber(n) {
            if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n/1000).toFixed(1) + 'k';
            return n.toString();
        }
        
        function showToast(message, icon = "✨") {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-32 left-1/2 transform -translate-x-1/2 bg-black/80 backdrop-blur-lg text-white text-xs px-4 py-2 rounded-full z-[200] whitespace-nowrap';
            toast.innerHTML = `${icon} ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        async function loadFeed() {
            const feedContainer = document.getElementById('feedContainer');
            feedContainer.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-pulse text-3xl text-purple-500"></i><p class="mt-4 text-white/60">Loading videos...</p></div>';
            
            try {
                const videosQuery = query(collection(db, 'videos'), orderBy('createdAt', 'desc'), limit(20));
                const snapshot = await getDocs(videosQuery);
                feedVideos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                if (feedVideos.length === 0) {
                    feedVideos = [
                        { id: 'demo1', videoUrl: 'https://assets.mixkit.co/videos/preview/mixkit-forest-stream-in-sunlight-529-large.mp4', username: 'nature_lover', userAvatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=nature', caption: 'Peaceful forest stream 🌿', music: 'Nature Sounds', likes: 12400, userId: 'demo' },
                        { id: 'demo2', videoUrl: 'https://assets.mixkit.co/videos/preview/mixkit-waves-in-the-water-1164-large.mp4', username: 'ocean_vibes', userAvatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=ocean', caption: 'Endless ocean therapy 🌊', music: 'Coastal Breeze', likes: 8700, userId: 'demo2' }
                    ];
                }
                
                renderFeed();
            } catch (error) {
                console.error('Error loading feed:', error);
                feedContainer.innerHTML = '<div class="flex items-center justify-center h-screen"><div class="text-center"><i class="fas fa-wifi text-3xl text-red-500"></i><p class="mt-4 text-white/60">Connection error. Pull to refresh.</p></div></div>';
            }
        }
        
        function renderFeed() {
            const feedContainer = document.getElementById('feedContainer');
            feedContainer.innerHTML = '';
            
            feedVideos.forEach((video, index) => {
                const feedItem = document.createElement('div');
                feedItem.className = 'feed-item';
                feedItem.setAttribute('data-id', video.id);
                
                const videoElem = document.createElement('video');
                videoElem.src = video.videoUrl;
                videoElem.className = 'video-element';
                videoElem.loop = true;
                videoElem.muted = true;
                videoElem.playsInline = true;
                
                const gradient = document.createElement('div');
                gradient.className = 'gradient-overlay';
                
                const actionBar = document.createElement('div');
                actionBar.className = 'action-bar';
                actionBar.innerHTML = `
                    <div class="action-icon like-icon" data-id="${video.id}">
                        <i class="far fa-heart"></i>
                        <span class="like-count">${formatNumber(video.likes || 0)}</span>
                    </div>
                    <div class="action-icon comment-icon">
                        <i class="far fa-comment"></i>
                    </div>
                    <div class="action-icon share-icon">
                        <i class="fas fa-share-alt"></i>
                    </div>
                    <div class="action-icon save-icon">
                        <i class="far fa-bookmark"></i>
                    </div>
                `;
                
                const captionDiv = document.createElement('div');
                captionDiv.className = 'caption-area';
                captionDiv.innerHTML = `
                    <div class="username" data-userid="${video.userId}">
                        <img src="${video.userAvatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + video.username}" class="w-6 h-6 rounded-full">
                        <span>@${video.username}</span>
                        <i class="fas fa-check-circle text-blue-400 text-xs"></i>
                    </div>
                    <div class="caption-text">${video.caption || 'No caption'}</div>
                    <div class="music-tag">
                        <i class="fas fa-music"></i>
                        <span>${video.music || 'Original Audio'}</span>
                    </div>
                `;
                
                feedItem.appendChild(videoElem);
                feedItem.appendChild(gradient);
                feedItem.appendChild(actionBar);
                feedItem.appendChild(captionDiv);
                feedContainer.appendChild(feedItem);
            });
            
            setupVideoAutoplay();
            attachEventListeners();
        }
        
        function setupVideoAutoplay() {
            const videos = document.querySelectorAll('.video-element');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    if (entry.isIntersecting) {
                        video.play().catch(e => console.log('Autoplay:', e));
                        document.querySelectorAll('.video-element').forEach(v => { if (v !== video) v.pause(); });
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.6 });
            videos.forEach(video => observer.observe(video));
        }
        
        function attachEventListeners() {
            document.querySelectorAll('.like-icon').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const videoId = btn.getAttribute('data-id');
                    const icon = btn.querySelector('i');
                    const countSpan = btn.querySelector('.like-count');
                    
                    if (!likeStates[videoId]) {
                        likeStates[videoId] = true;
                        icon.classList.remove('far');
                        icon.classList.add('fas', 'text-fuchsia-500');
                        
                        const heart = document.createElement('div');
                        heart.innerHTML = '❤️';
                        heart.className = 'floating-heart';
                        btn.style.position = 'relative';
                        btn.appendChild(heart);
                        setTimeout(() => heart.remove(), 600);
                        
                        let currentLikes = parseInt(countSpan.innerText) || 0;
                        if (isNaN(currentLikes)) currentLikes = 0;
                        countSpan.innerText = formatNumber(currentLikes + 1);
                        
                        if (currentUser && videoId !== 'demo1' && videoId !== 'demo2') {
                            const videoRef = doc(db, 'videos', videoId);
                            await updateDoc(videoRef, { likes: (currentLikes + 1), likedBy: arrayUnion(currentUser.uid) });
                        }
                        
                        if (navigator.vibrate) navigator.vibrate(30);
                    }
                });
            });
            
            document.querySelectorAll('.username').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const userId = btn.getAttribute('data-userid');
                    window.location.href = `/profile.html?userId=${userId}`;
                });
            });
            
            document.querySelectorAll('.share-icon').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (navigator.share) {
                        await navigator.share({ title: 'Tweaks Video', text: 'Check out this video!' });
                    } else {
                        showToast('Link copied to clipboard!', '🔗');
                        navigator.clipboard.writeText(window.location.href);
                    }
                });
            });
        }
        
        // Navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.getAttribute('data-page');
                if (page === 'profile') window.location.href = '/profile.html';
                else if (page === 'discover') showToast('Discover page coming soon!', '🔍');
            });
        });
        
        // Upload button
        const uploadMenu = document.getElementById('uploadMenu');
        document.getElementById('uploadBtn').addEventListener('click', () => {
            uploadMenu.classList.remove('hidden');
            uploadMenu.classList.add('flex');
        });
        document.getElementById('closeMenuBtn').addEventListener('click', () => {
            uploadMenu.classList.add('hidden');
            uploadMenu.classList.remove('flex');
        });
        document.querySelectorAll('[data-option]').forEach(opt => {
            opt.addEventListener('click', () => {
                showToast(`${opt.getAttribute('data-option').toUpperCase()} feature coming soon!`, '🚀');
                uploadMenu.classList.add('hidden');
                uploadMenu.classList.remove('flex');
            });
        });
        
        // Auth check
        const userAvatar = document.getElementById('userAvatar');
        const loginIcon = document.getElementById('loginIcon');
        
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '/login.html';
                return;
            }
            currentUser = user;
            loginIcon.style.display = 'none';
            userAvatar.style.display = 'block';
            
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.exists()) {
                userAvatar.src = userDoc.data().avatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`;
            } else {
                userAvatar.src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`;
            }
            
            loadFeed();
        });
        
        userAvatar.addEventListener('click', () => window.location.href = '/profile.html');
    </script>
</body>
</html>
